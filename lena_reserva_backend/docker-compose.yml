version: "3.9"

services:

  mysql:

    image: mysql:8

    container_name: lena_mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: password

      MYSQL_DATABASE: lena_reserva

    ports:

      - "3306:3306"

  redis:

    image: redis:latest

    container_name: lena_redis

    ports:

      - "6379:6379"